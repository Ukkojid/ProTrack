name: Deploy ProTrack to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Copy necessary files
        run: |
          cp package.json .next/standalone/
          cp ecosystem.config.js .next/standalone/
          mv .next/static .next/standalone/.next/static
          mv public .next/standalone/public

      - name: Zip the standalone folder
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "protrack-ukkojid"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip